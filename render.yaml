services:
  - type: web
    name: jmeter-portal
    env: node
    buildCommand: npm install && mkdir -p jmeter && curl -L https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz | tar -xz -C jmeter --strip-components=1
    startCommand: npm start
    envVars:
      - key: JMETER_PATH
        value: ./jmeter/bin/jmeter